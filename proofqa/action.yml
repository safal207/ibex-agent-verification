name: "ProofQA Release Gate"
author: "Aleksei Safonov"
description: "Evidence-first PASS, WARN, or BLOCK gate for scorecards, transitions, and manifest-bound evidence."

inputs:
  summary-path:
    description: "Path to a ProofQA summary.json containing scorecard_version 2 or 3."
    required: true
  transition-report-path:
    description: "Optional Transition Phase Contract verification report consumed when transition-policy is not ignore."
    required: false
    default: ""
  transition-policy:
    description: "Transition enforcement mode. One of ignore, warn, or require-verified."
    required: false
    default: "ignore"
  transition-manifest-policy:
    description: "Evidence binding mode. One of ignore, verify, or require-attested."
    required: false
    default: "ignore"
  transition-evidence-dir:
    description: "Root directory containing the transition report, manifest, and evidence files."
    required: false
    default: ""
  transition-manifest-path:
    description: "Manifest inventory inside transition-evidence-dir."
    required: false
    default: ""
  transition-manifest-receipt-path:
    description: "Destination for the verified transition-manifest receipt."
    required: false
    default: "proofqa-transition-manifest-receipt.json"
  transition-attestation-bundle-path:
    description: "Sigstore bundle for the manifest when transition-manifest-policy is require-attested."
    required: false
    default: ""
  transition-attestation-repository:
    description: "Expected owner/repository for manifest attestation; defaults to the current repository."
    required: false
    default: ""
  transition-attestation-signer-workflow:
    description: "Exact owner/repository/.github/workflows/file.yml identity allowed to sign the manifest."
    required: false
    default: ""
  policy-name:
    description: "Human-readable policy name included in the gate report."
    required: false
    default: "default"
  min-end-to-end:
    description: "Minimum accepted end-to-end score percentage."
    required: false
    default: "90"
  min-answer-correctness:
    description: "Minimum accepted answer correctness percentage on completed tasks."
    required: false
    default: "90"
  min-completion-reliability:
    description: "Minimum accepted completion reliability percentage."
    required: false
    default: "95"
  min-provider-reliability:
    description: "Minimum accepted provider reliability percentage."
    required: false
    default: "95"
  warn-margin:
    description: "Percentage-point margin above each minimum that produces WARN instead of PASS."
    required: false
    default: "3"
  max-p95-duration-ms:
    description: "Maximum client-observed p95 duration for successful requests in milliseconds; zero disables the time gate."
    required: false
    default: "0"
  time-warn-margin-ms:
    description: "Warning band below the maximum p95 duration in milliseconds."
    required: false
    default: "250"
  unknown-metric-policy:
    description: "Decision for null metrics. One of block, warn, or ignore."
    required: false
    default: "block"
  fail-on:
    description: "Workflow enforcement level. One of block, warn, or never."
    required: false
    default: "block"
  report-path:
    description: "Destination for the machine-readable ProofQA gate report."
    required: false
    default: "proofqa-gate-report.json"

outputs:
  decision:
    description: "ProofQA policy decision: PASS, WARN, or BLOCK."
    value: ${{ steps.gate.outputs.decision }}
  should-fail:
    description: "Whether the configured fail-on policy requires a failing action step."
    value: ${{ steps.gate.outputs.should-fail }}
  report-path:
    description: "Path to the generated machine-readable gate report."
    value: ${{ steps.gate.outputs.report-path }}
  summary-sha256:
    description: "SHA-256 digest of the evaluated ProofQA summary."
    value: ${{ steps.gate.outputs.summary-sha256 }}
  end-to-end-percent:
    description: "Evaluated end-to-end percentage or n/a."
    value: ${{ steps.gate.outputs.end-to-end-percent }}
  answer-correctness-percent:
    description: "Evaluated answer correctness percentage or n/a."
    value: ${{ steps.gate.outputs.answer-correctness-percent }}
  completion-reliability-percent:
    description: "Evaluated completion reliability percentage or n/a."
    value: ${{ steps.gate.outputs.completion-reliability-percent }}
  provider-reliability-percent:
    description: "Evaluated provider reliability percentage or n/a."
    value: ${{ steps.gate.outputs.provider-reliability-percent }}
  p95-duration-ms:
    description: "Client-observed successful-request p95 duration in milliseconds or n/a."
    value: ${{ steps.gate.outputs.p95-duration-ms }}
  transition-status:
    description: "Evaluated transition status or n/a."
    value: ${{ steps.gate.outputs.transition-status }}
  transition-phase:
    description: "Evaluated transition phase or n/a."
    value: ${{ steps.gate.outputs.transition-phase }}
  transition-sha256:
    description: "SHA-256 digest of the evaluated transition report or n/a."
    value: ${{ steps.gate.outputs.transition-sha256 }}
  transition-manifest-status:
    description: "Verified transition manifest status or n/a."
    value: ${{ steps.gate.outputs.transition-manifest-status }}
  transition-manifest-sha256:
    description: "SHA-256 digest of the verified transition manifest or n/a."
    value: ${{ steps.gate.outputs.transition-manifest-sha256 }}
  transition-manifest-receipt-sha256:
    description: "SHA-256 digest of the transition manifest receipt or n/a."
    value: ${{ steps.gate.outputs.transition-manifest-receipt-sha256 }}
  transition-attestation-status:
    description: "Transition manifest attestation status or n/a."
    value: ${{ steps.gate.outputs.transition-attestation-status }}

runs:
  using: "composite"
  steps:
    - name: "Set up pinned Python runtime"
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"

    - name: "Preflight transition evidence"
      shell: bash
      env:
        PROOFQA_TRANSITION_REPORT_PATH: ${{ inputs.transition-report-path }}
        PROOFQA_TRANSITION_POLICY: ${{ inputs.transition-policy }}
      run: python "$GITHUB_ACTION_PATH/../scripts/proofqa_transition_preflight.py"

    - name: "Bind transition references to manifest bytes"
      if: inputs.transition-manifest-policy != 'ignore'
      shell: bash
      env:
        EVIDENCE_DIR: ${{ inputs.transition-evidence-dir }}
        MANIFEST_PATH: ${{ inputs.transition-manifest-path }}
        TRANSITION_REPORT_PATH: ${{ inputs.transition-report-path }}
        MANIFEST_POLICY: ${{ inputs.transition-manifest-policy }}
        RECEIPT_PATH: ${{ inputs.transition-manifest-receipt-path }}
      run: |
        set -euo pipefail
        [[ -n "$EVIDENCE_DIR" ]]
        [[ -n "$MANIFEST_PATH" ]]
        [[ -n "$TRANSITION_REPORT_PATH" ]]
        [[ -n "$RECEIPT_PATH" ]]
        python "$GITHUB_ACTION_PATH/../scripts/proofqa_transition_manifest.py" verify \
          --evidence-dir "$EVIDENCE_DIR" \
          --manifest "$MANIFEST_PATH" \
          --transition-report "$TRANSITION_REPORT_PATH" \
          --policy "$MANIFEST_POLICY" \
          --receipt "$RECEIPT_PATH"

    - name: "Verify transition manifest attestation online and from bundle"
      if: inputs.transition-manifest-policy == 'require-attested'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        MANIFEST_PATH: ${{ inputs.transition-manifest-path }}
        RECEIPT_PATH: ${{ inputs.transition-manifest-receipt-path }}
        ATTESTATION_BUNDLE: ${{ inputs.transition-attestation-bundle-path }}
        EXPECTED_REPOSITORY: ${{ inputs.transition-attestation-repository }}
        EXPECTED_SIGNER_WORKFLOW: ${{ inputs.transition-attestation-signer-workflow }}
      run: |
        set -euo pipefail
        repository="${EXPECTED_REPOSITORY:-$GITHUB_REPOSITORY}"
        [[ -n "$EXPECTED_SIGNER_WORKFLOW" ]]
        [[ -s "$MANIFEST_PATH" ]]
        [[ -s "$ATTESTATION_BUNDLE" ]]
        mkdir -p "$(dirname "$RECEIPT_PATH")"
        online_report="${RECEIPT_PATH}.attestation-online.json"
        bundled_report="${RECEIPT_PATH}.attestation-bundled.json"
        gh attestation verify "$MANIFEST_PATH" \
          --repo "$repository" \
          --signer-workflow "$EXPECTED_SIGNER_WORKFLOW" \
          --deny-self-hosted-runners \
          --format json > "$online_report"
        gh attestation verify "$MANIFEST_PATH" \
          --repo "$repository" \
          --signer-workflow "$EXPECTED_SIGNER_WORKFLOW" \
          --deny-self-hosted-runners \
          --bundle "$ATTESTATION_BUNDLE" \
          --format json > "$bundled_report"
        python "$GITHUB_ACTION_PATH/../scripts/proofqa_transition_manifest.py" finalize-attestation \
          --receipt "$RECEIPT_PATH" \
          --online-report "$online_report" \
          --bundled-report "$bundled_report" \
          --attestation-bundle "$ATTESTATION_BUNDLE" \
          --repository "$repository" \
          --signer-workflow "$EXPECTED_SIGNER_WORKFLOW"

    - name: "Evaluate ProofQA release policy"
      id: gate
      shell: bash
      env:
        PROOFQA_SUMMARY_PATH: ${{ inputs.summary-path }}
        PROOFQA_TRANSITION_REPORT_PATH: ${{ inputs.transition-report-path }}
        PROOFQA_TRANSITION_POLICY: ${{ inputs.transition-policy }}
        PROOFQA_TRANSITION_MANIFEST_POLICY: ${{ inputs.transition-manifest-policy }}
        PROOFQA_TRANSITION_MANIFEST_RECEIPT_PATH: ${{ inputs.transition-manifest-receipt-path }}
        PROOFQA_POLICY_NAME: ${{ inputs.policy-name }}
        PROOFQA_MIN_END_TO_END: ${{ inputs.min-end-to-end }}
        PROOFQA_MIN_ANSWER_CORRECTNESS: ${{ inputs.min-answer-correctness }}
        PROOFQA_MIN_COMPLETION_RELIABILITY: ${{ inputs.min-completion-reliability }}
        PROOFQA_MIN_PROVIDER_RELIABILITY: ${{ inputs.min-provider-reliability }}
        PROOFQA_WARN_MARGIN: ${{ inputs.warn-margin }}
        PROOFQA_MAX_P95_DURATION_MS: ${{ inputs.max-p95-duration-ms }}
        PROOFQA_TIME_WARN_MARGIN_MS: ${{ inputs.time-warn-margin-ms }}
        PROOFQA_UNKNOWN_METRIC_POLICY: ${{ inputs.unknown-metric-policy }}
        PROOFQA_FAIL_ON: ${{ inputs.fail-on }}
        PROOFQA_REPORT_PATH: ${{ inputs.report-path }}
      run: python "$GITHUB_ACTION_PATH/../scripts/proofqa_gate_v5.py"

branding:
  icon: "shield"
  color: "blue"
