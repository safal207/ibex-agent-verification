name: AI QA Engineer Verification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/qa-model-verification.yml"
      - "benchmarks/*.json"
      - "src/ibex_agent_verification/qa_benchmark.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "scripts/build_qa_benchmark_bundle.py"
      - "scripts/build_qa_workflow_matrix.py"
      - "tests/test_qa_benchmark*.py"
      - "tests/test_qa_completion_budget.py"
      - "tests/test_qa_scorecard.py"
      - "tests/test_qa_suite_catalog.py"
      - "docs/AI_QA_ENGINEER_SUITE.md"
      - "docs/MOBILE_QA_SUITE.md"
  pull_request:
    paths:
      - ".github/workflows/qa-model-verification.yml"
      - "benchmarks/*.json"
      - "src/ibex_agent_verification/qa_benchmark.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "scripts/build_qa_benchmark_bundle.py"
      - "scripts/build_qa_workflow_matrix.py"
      - "tests/test_qa_benchmark*.py"
      - "tests/test_qa_completion_budget.py"
      - "tests/test_qa_scorecard.py"
      - "tests/test_qa_suite_catalog.py"
      - "docs/AI_QA_ENGINEER_SUITE.md"
      - "docs/MOBILE_QA_SUITE.md"

permissions:
  contents: read

concurrency:
  group: ai-qa-engineer-verification-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare-matrix:
    if: >-
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.head_ref, 'verify/qa-suite-live-')
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out verification project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install verification project
        run: python -m pip install -e .

      - name: Build validated suite and model matrix
        id: matrix
        run: >-
          python scripts/build_qa_workflow_matrix.py
          --catalog benchmarks/qa-suite-catalog.json
          --github-output "$GITHUB_OUTPUT"

  qa-suite:
    needs: prepare-matrix
    if: needs.prepare-matrix.result == 'success'
    name: qa-suite (${{ matrix.suite_slug }} / ${{ matrix.model }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      PROVIDER: ${{ matrix.provider }}
      CEREBRAS_MODEL: ${{ matrix.model }}
      MODEL_SLUG: ${{ matrix.model_slug }}
      SUITE_ID: ${{ matrix.suite_id }}
      SUITE_SLUG: ${{ matrix.suite_slug }}
      SUITE_PATH: ${{ matrix.suite_path }}
      EXPECTED_TASK_COUNT: ${{ matrix.task_count }}
      MODEL_ROOT: artifacts/${{ matrix.suite_slug }}/${{ matrix.model_slug }}
      BUNDLE_DIR: artifacts/${{ matrix.suite_slug }}/${{ matrix.model_slug }}/qa-benchmark
      REQUEST_COOLDOWN_SECONDS: "15"

    steps:
      - name: Check out verification project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Require Cerebras repository secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$PROVIDER" != "cerebras" ]]; then
            echo "::error::unsupported provider in current live workflow: $PROVIDER"
            exit 3
          fi
          if [[ -z "${CEREBRAS_API_KEY:-}" ]]; then
            echo "::error::CEREBRAS_API_KEY repository secret is unavailable"
            exit 4
          fi

      - name: Install verification project and pinned Cerebras SDK
        run: python -m pip install -e '.[cerebras]'

      - name: Verify selected model in live Cerebras catalog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$BUNDLE_DIR"
          python - <<'PY'
          import json
          import os
          from importlib import metadata
          from pathlib import Path

          from cerebras.cloud.sdk import Cerebras

          model = os.environ["CEREBRAS_MODEL"]
          provider = os.environ["PROVIDER"]
          target = Path(os.environ["BUNDLE_DIR"]) / "model-catalog.json"
          client = Cerebras(
              api_key=os.environ["CEREBRAS_API_KEY"],
              base_url="https://api.cerebras.ai",
              timeout=30,
              max_retries=0,
              warm_tcp_connection=False,
          )
          try:
              response = client.models.list()
              data = getattr(response, "data", None)
              if data is None and isinstance(response, dict):
                  data = response.get("data")
              if not isinstance(data, (list, tuple)):
                  raise SystemExit("Cerebras models.list() returned no model array")
              ids = []
              for item in data:
                  model_id = getattr(item, "id", None)
                  if isinstance(item, dict):
                      model_id = item.get("id", model_id)
                  if not isinstance(model_id, str) or not model_id.strip():
                      raise SystemExit("Cerebras model catalog contains invalid id")
                  ids.append(model_id)
          finally:
              close = getattr(client, "close", None)
              if callable(close):
                  close()

          ids = sorted(set(ids))
          report = {
              "schema_version": 1,
              "provider": provider,
              "endpoint": "https://api.cerebras.ai/v1/models",
              "requested_model": model,
              "requested_model_available": model in ids,
              "model_ids": ids,
              "sdk": {
                  "package": "cerebras_cloud_sdk",
                  "version": metadata.version("cerebras_cloud_sdk"),
              },
          }
          target.write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          if model not in ids:
              raise SystemExit(f"requested Cerebras model is unavailable: {model}")
          PY

      - name: Run catalog-selected QA tasks
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t task_ids < <(
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          suite = json.loads(Path(os.environ["SUITE_PATH"]).read_text(encoding="utf-8"))
          if suite.get("suite_id") != os.environ["SUITE_ID"]:
              raise SystemExit("selected suite_id does not match suite file")
          for task in suite["tasks"]:
              print(task["id"])
          PY
          )
          [[ "${#task_ids[@]}" -eq "$EXPECTED_TASK_COUNT" ]]

          for task_id in "${task_ids[@]}"; do
            task_root="$BUNDLE_DIR/tasks/$task_id"
            mkdir -p "$task_root"

            python scripts/qa_benchmark.py prepare \
              --suite "$SUITE_PATH" \
              --task-id "$task_id" \
              --model "$CEREBRAS_MODEL" \
              --output "$task_root/request.json"

            echo "Cooling down ${REQUEST_COOLDOWN_SECONDS}s before suite=$SUITE_ID task=$task_id model=$CEREBRAS_MODEL"
            sleep "$REQUEST_COOLDOWN_SECONDS"

            set +e
            ibex-av run-cerebras-inference \
              --request "$task_root/request.json" \
              --model "$CEREBRAS_MODEL" \
              --project-sha "$GITHUB_SHA" \
              --timeout-seconds 60 \
              --evidence-dir "$task_root/evidence" \
              --report "$task_root/run-report.json"
            inference_rc=$?
            set -e
            echo "suite=$SUITE_ID task=$task_id inference_exit_code=$inference_rc"

            [[ -f "$task_root/evidence/manifest.json" ]]
            ibex-av verify-evidence \
              --manifest "$task_root/evidence/manifest.json" \
              --report "$task_root/verification.json"

            python scripts/qa_benchmark.py score \
              --suite "$SUITE_PATH" \
              --task-id "$task_id" \
              --capture "$task_root/evidence/raw/capture.jsonl" \
              --provider "$PROVIDER" \
              --model "$CEREBRAS_MODEL" \
              --report "$task_root/score.json"
          done

      - name: Summarize deterministic QA scores
        shell: bash
        run: |
          set -euo pipefail
          reports_dir="$(mktemp -d)"
          for score in "$BUNDLE_DIR"/tasks/*/score.json; do
            task_id="$(basename "$(dirname "$score")")"
            cp "$score" "$reports_dir/$task_id.json"
          done
          python scripts/qa_benchmark.py summarize \
            --suite "$SUITE_PATH" \
            --reports-dir "$reports_dir" \
            --provider "$PROVIDER" \
            --model "$CEREBRAS_MODEL" \
            --report "$BUNDLE_DIR/summary.json"

      - name: Build and independently verify outer benchmark manifest
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_qa_benchmark_bundle.py \
            --bundle-dir "$BUNDLE_DIR" \
            --suite "$SUITE_PATH" \
            --provider "$PROVIDER" \
            --model "$CEREBRAS_MODEL" \
            --project-sha "$GITHUB_SHA"
          ibex-av verify-evidence \
            --manifest "$BUNDLE_DIR/manifest.json" \
            --report "$MODEL_ROOT/qa-benchmark-verification.json"

      - name: Enforce credential non-persistence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          secret = os.environ["CEREBRAS_API_KEY"].encode("utf-8")
          root = Path(os.environ["MODEL_ROOT"])
          for path in root.rglob("*"):
              if path.is_file() and secret in path.read_bytes():
                  raise SystemExit(f"credential value persisted in artifact: {path}")
          PY

      - name: Publish suite and model scorecard to Actions summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["BUNDLE_DIR"]) / "summary.json"
          if not summary_path.is_file():
              raise SystemExit(0)
          report = json.loads(summary_path.read_text(encoding="utf-8"))
          scorecard = report["scorecard"]
          end_to_end = scorecard["end_to_end_score"]
          correctness = scorecard["answer_correctness"]
          completion = scorecard["completion_reliability"]
          provider = scorecard["provider_reliability"]
          outcomes = scorecard["outcomes"]

          def percent(value):
              return "n/a" if value is None else f"{value}%"

          lines = [
              f"## {report['title']} — {report['model']}",
              "",
              f"- Suite: `{report['suite_id']}`",
              f"- End-to-end score: `{end_to_end['earned']}/{end_to_end['possible']}` "
              f"(`{percent(end_to_end['percent'])}`)",
              f"- Answer correctness: `{correctness['earned']}/{correctness['possible']}` "
              f"(`{percent(correctness['percent'])}` across "
              f"`{correctness['tasks_evaluated']}` completed tasks)",
              f"- Completion reliability: `{completion['completed']}/{completion['total']}` "
              f"(`{percent(completion['percent'])}`)",
              f"- Provider reliability: `{provider['successful']}/{provider['observed']}` "
              f"known outcomes (`{percent(provider['percent'])}`); "
              f"failed=`{provider['failed']}`, unknown=`{provider['unknown']}`",
              f"- Outcomes: pass=`{outcomes['pass']}`, fail=`{outcomes['fail']}`, "
              f"invalid=`{outcomes['invalid_response']}`, "
              f"truncated=`{outcomes['output_truncated']}`, "
              f"inference_failed=`{outcomes['inference_failed']}`",
              "",
              "| Category | End-to-end score |",
              "|---|---:|",
          ]
          for category, score in sorted(report["categories"].items()):
              lines.append(
                  f"| `{category}` | {score['earned']}/{score['possible']} "
                  f"({score['percent']}%) |"
              )
          if provider["failure_classes"]:
              lines.extend(["", "Provider failure classes:"])
              for failure_class, count in provider["failure_classes"].items():
                  lines.append(f"- `{failure_class}`: `{count}`")
          lines.extend(
              [
                  "",
                  f"Scorecard boundary: {scorecard['claim_boundary']}",
                  "",
                  f"Suite boundary: {report['claim_boundary']}",
                  "",
              ]
          )
          markdown = "\n".join(lines)
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open(
              "a", encoding="utf-8"
          ) as output:
              output.write(markdown)
          print(markdown)
          PY

      - name: Upload suite and model scoped QA evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-qa-engineer-${{ matrix.suite_slug }}-${{ matrix.model_slug }}-${{ github.sha }}
          path: artifacts/${{ matrix.suite_slug }}/${{ matrix.model_slug }}/
          if-no-files-found: error
          retention-days: 14
