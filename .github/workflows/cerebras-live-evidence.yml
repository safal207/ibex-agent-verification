name: Cerebras Live Evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cerebras-live-evidence.yml"
      - "tests/test_cerebras_model_matrix_workflow.py"
      - "docs/MULTI_MODEL_EVIDENCE.md"

permissions:
  contents: read

concurrency:
  group: cerebras-live-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-evidence:
    name: live-evidence (${{ matrix.model }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: gpt-oss-120b
            slug: gpt-oss-120b
          - model: zai-glm-4.7
            slug: zai-glm-4-7
    env:
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      CEREBRAS_MODEL: ${{ matrix.model }}
      MODEL_SLUG: ${{ matrix.slug }}
      ARTIFACT_ROOT: artifacts/${{ matrix.slug }}
      EVIDENCE_DIR: artifacts/${{ matrix.slug }}/cerebras-live-evidence
      REQUEST_PATH: artifacts/${{ matrix.slug }}/cerebras-live-request.json

    steps:
      - name: Check out verification project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Require Cerebras repository secret
        shell: bash
        run: |
          if [[ -z "${CEREBRAS_API_KEY:-}" ]]; then
            echo "::error::CEREBRAS_API_KEY repository secret is unavailable"
            exit 4
          fi

      - name: Install verification project and pinned Cerebras SDK
        run: python -m pip install -e '.[cerebras]'

      - name: Verify model is currently listed by Cerebras
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_ROOT"
          python - <<'PY'
          import json
          import os
          from importlib import metadata
          from pathlib import Path

          from cerebras.cloud.sdk import Cerebras

          api_key = os.environ["CEREBRAS_API_KEY"]
          requested = os.environ["CEREBRAS_MODEL"]
          output = Path(os.environ["ARTIFACT_ROOT"]) / "cerebras-model-catalog.json"
          client = Cerebras(
              api_key=api_key,
              base_url="https://api.cerebras.ai",
              timeout=30,
              max_retries=0,
              warm_tcp_connection=False,
          )
          try:
              response = client.models.list()
              data = getattr(response, "data", None)
              if data is None and isinstance(response, dict):
                  data = response.get("data")
              if not isinstance(data, (list, tuple)):
                  raise SystemExit("Cerebras models.list() returned no model array")

              models = []
              for item in data:
                  model_id = getattr(item, "id", None)
                  owner = getattr(item, "owned_by", None)
                  if isinstance(item, dict):
                      model_id = item.get("id", model_id)
                      owner = item.get("owned_by", owner)
                  if not isinstance(model_id, str) or not model_id.strip():
                      raise SystemExit("Cerebras model catalog contains an invalid id")
                  models.append(
                      {
                          "id": model_id,
                          "owned_by": owner if isinstance(owner, str) else None,
                      }
                  )
          finally:
              close = getattr(client, "close", None)
              if callable(close):
                  close()

          models.sort(key=lambda item: item["id"])
          available = [item["id"] for item in models]
          report = {
              "schema_version": 1,
              "provider": "cerebras",
              "endpoint": "https://api.cerebras.ai/v1/models",
              "requested_model": requested,
              "requested_model_available": requested in available,
              "models": models,
              "sdk": {
                  "package": "cerebras_cloud_sdk",
                  "version": metadata.version("cerebras_cloud_sdk"),
              },
          }
          output.write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          if requested not in available:
              raise SystemExit(
                  f"requested Cerebras model is not currently available: {requested}"
              )
          PY

      - name: Prepare bounded streaming request
        shell: bash
        run: |
          mkdir -p "$ARTIFACT_ROOT"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          source = Path("tests/fixtures/inference/openai_request.json")
          target = Path(os.environ["REQUEST_PATH"])
          request = json.loads(source.read_text(encoding="utf-8"))
          request["model"] = os.environ["CEREBRAS_MODEL"]
          request.pop("max_tokens", None)
          request["max_completion_tokens"] = 64
          target.write_text(
              json.dumps(request, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run one live Cerebras stream
        id: live
        shell: bash
        run: |
          set +e
          ibex-av run-cerebras-inference \
            --request "$REQUEST_PATH" \
            --model "$CEREBRAS_MODEL" \
            --project-sha "$GITHUB_SHA" \
            --timeout-seconds 60 \
            --evidence-dir "$EVIDENCE_DIR" \
            --report "$ARTIFACT_ROOT/cerebras-live-run-report.json"
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify live evidence bundle integrity
        if: always()
        shell: bash
        run: |
          if [[ ! -f "$EVIDENCE_DIR/manifest.json" ]]; then
            echo "::error::No Cerebras evidence manifest was produced for $CEREBRAS_MODEL"
            exit 1
          fi
          ibex-av verify-evidence \
            --manifest "$EVIDENCE_DIR/manifest.json" \
            --report "$ARTIFACT_ROOT/cerebras-live-verification.json"

      - name: Enforce complete result and secret non-persistence
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence = Path(os.environ["EVIDENCE_DIR"])
          manifest_path = evidence / "manifest.json"
          if not manifest_path.is_file():
              raise SystemExit("missing evidence manifest")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          result = manifest.get("result", {})
          if result.get("status") != "COMPLETE":
              raise SystemExit(
                  f"live request was not complete: {result.get('status')} "
                  f"HTTP={result.get('http_status')}"
              )
          observed_model = manifest.get("workload", {}).get("model")
          expected_model = os.environ["CEREBRAS_MODEL"]
          if observed_model != expected_model:
              raise SystemExit(
                  f"evidence model mismatch: expected={expected_model!r} "
                  f"observed={observed_model!r}"
              )

          secret = os.environ["CEREBRAS_API_KEY"].encode("utf-8")
          root = Path(os.environ["ARTIFACT_ROOT"])
          for path in root.rglob("*"):
              if path.is_file() and secret in path.read_bytes():
                  raise SystemExit(f"credential value persisted in artifact: {path}")
          PY

      - name: Write sanitized Actions summary and receipt
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["ARTIFACT_ROOT"])
          evidence = Path(os.environ["EVIDENCE_DIR"])
          manifest_path = evidence / "manifest.json"
          analysis_path = evidence / "analysis.json"

          receipt = {
              "run_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/"
                  f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
                  f"{os.environ['GITHUB_RUN_ID']}"
              ),
              "commit": os.environ["GITHUB_SHA"],
              "status": "NO_MANIFEST",
              "model": os.environ["CEREBRAS_MODEL"],
              "model_slug": os.environ["MODEL_SLUG"],
              "http_status": None,
              "time_to_first_output_ms": None,
              "output_tokens_per_second": None,
              "throughput_source": None,
              "provider_completion_time_seconds": None,
              "sdk_version": None,
          }

          if manifest_path.is_file():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              result = manifest.get("result", {})
              receipt.update(
                  {
                      "status": result.get("status", "UNKNOWN"),
                      "model": manifest.get("workload", {}).get(
                          "model", receipt["model"]
                      ),
                      "http_status": result.get("http_status"),
                      "time_to_first_output_ms": result.get(
                          "time_to_first_output_ms"
                      ),
                      "output_tokens_per_second": result.get(
                          "output_tokens_per_second"
                      ),
                      "throughput_source": result.get("throughput_source"),
                      "sdk_version": manifest.get("runner", {})
                      .get("sdk", {})
                      .get("version"),
                  }
              )

          if analysis_path.is_file():
              analysis = json.loads(analysis_path.read_text(encoding="utf-8"))
              provider_timing = (
                  analysis.get("timing", {}).get("provider_reported_seconds") or {}
              )
              receipt["provider_completion_time_seconds"] = provider_timing.get(
                  "completion_time"
              )

          root.mkdir(parents=True, exist_ok=True)
          receipt_json = root / "cerebras-live-receipt.json"
          receipt_json.write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          def render(value):
              return "n/a" if value is None else str(value)

          icon = "✅" if receipt["status"] == "COMPLETE" else "❌"
          markdown = "\n".join(
              [
                  f"## {icon} Cerebras live evidence — {receipt['model']}",
                  "",
                  f"- Run: {receipt['run_url']}",
                  f"- Commit: `{receipt['commit']}`",
                  f"- Status: `{receipt['status']}`",
                  f"- Model: `{receipt['model']}`",
                  f"- HTTP status: `{render(receipt['http_status'])}`",
                  f"- TTFT: `{render(receipt['time_to_first_output_ms'])} ms`",
                  (
                      "- Output throughput: "
                      f"`{render(receipt['output_tokens_per_second'])} tokens/s`"
                  ),
                  f"- Throughput source: `{render(receipt['throughput_source'])}`",
                  (
                      "- Provider completion time: "
                      f"`{render(receipt['provider_completion_time_seconds'])} s`"
                  ),
                  f"- SDK version: `{render(receipt['sdk_version'])}`",
                  "",
                  (
                      "Claim boundary: one client-observed API stream and bundle "
                      "integrity; no internal hardware, model-quality, or RTL claim."
                  ),
                  "",
              ]
          )
          (root / "cerebras-live-receipt.md").write_text(
              markdown, encoding="utf-8"
          )
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open(
              "a", encoding="utf-8"
          ) as summary:
              summary.write(markdown)
          print(markdown)
          PY

      - name: Upload model-scoped Cerebras evidence and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cerebras-live-evidence-${{ matrix.slug }}-${{ github.sha }}
          path: artifacts/${{ matrix.slug }}/
          if-no-files-found: warn
          retention-days: 14
