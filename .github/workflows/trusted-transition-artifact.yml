name: Trusted Transition Artifact Ingestion

on:
  pull_request:
    paths:
      - ".github/workflows/github-release-production-deployment.yml"
      - ".github/workflows/github-release-runtime-verification.yml"
      - ".github/workflows/trusted-transition-artifact.yml"
      - "scripts/github_release_production_source.py"
      - "scripts/github_release_runtime_source.py"
      - "scripts/capture_runtime_install.py"
      - "scripts/trusted_transition_artifact.py"
      - "scripts/trusted_transition_artifact_audit.py"
      - "scripts/publish_trusted_artifact_ingestion_receipt.py"
      - "scripts/production_transition_source.py"
      - "scripts/proofqa_transition_manifest*.py"
      - "proofqa/action.yml"
      - "tests/test_github_release_runtime_source.py"
      - "tests/test_github_release_production_source.py"
      - "tests/test_trusted_transition_artifact*.py"
      - "tests/test_publish_trusted_artifact_ingestion_receipt.py"
      - "tests/fixtures/proofqa/trusted-artifact-ingestion-contract.json"
      - "docs/TRUSTED_TRANSITION_ARTIFACT_INGESTION.md"
  workflow_call:
    inputs:
      source_sha:
        description: Exact main-branch commit executed by the runtime oracle.
        required: true
        type: string
      source_run_id:
        description: Runtime workflow run containing the source artifact.
        required: true
        type: number
      source_run_attempt:
        description: Runtime workflow run attempt.
        required: true
        type: number
      source_head_repository_id:
        description: Repository ID recorded by the trusted runtime trigger.
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: trusted-transition-artifact-${{ inputs.source_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Test signer and runtime contracts
        run: |
          python -m unittest -v \
            tests.test_github_release_runtime_source \
            tests.test_github_release_production_source \
            tests.test_production_transition_source \
            tests.test_proofqa_transition_manifest_builder \
            tests.test_trusted_transition_artifact \
            tests.test_trusted_transition_artifact_audit \
            tests.test_trusted_transition_artifact_workflow \
            tests.test_publish_trusted_artifact_ingestion_receipt

  produce:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      issues: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      SOURCE_WORKFLOW: .github/workflows/github-release-runtime-verification.yml
      DESTINATION_ENVIRONMENT: ibex-runtime-verification
      SOURCE_SHA: ${{ inputs.source_sha }}
      SOURCE_RUN_ID: ${{ inputs.source_run_id }}
      SOURCE_RUN_ATTEMPT: ${{ inputs.source_run_attempt }}
      SOURCE_HEAD_REPOSITORY_ID: ${{ inputs.source_head_repository_id }}
      REPOSITORY_ID: ${{ github.repository_id }}
    steps:
      - name: Check out exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Require immutable reusable-workflow inputs
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$SOURCE_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$SOURCE_HEAD_REPOSITORY_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$SOURCE_RUN_ID" = "$GITHUB_RUN_ID"
          test "$SOURCE_RUN_ATTEMPT" = "$GITHUB_RUN_ATTEMPT"
          test "$SOURCE_HEAD_REPOSITORY_ID" = "$REPOSITORY_ID"
          git diff --exit-code
      - name: Select exact runtime source artifact
        id: source-artifact
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: proofqa-transition-source-${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/trusted-transition-ingested
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts?name=$ARTIFACT_NAME&per_page=100" \
            > artifacts/trusted-transition-ingested/source-artifacts-api.json
          python scripts/trusted_transition_artifact.py select \
            --api-json artifacts/trusted-transition-ingested/source-artifacts-api.json \
            --expected-repository "$GITHUB_REPOSITORY" \
            --expected-repository-id "$REPOSITORY_ID" \
            --expected-head-repository-id "$SOURCE_HEAD_REPOSITORY_ID" \
            --expected-run-id "$SOURCE_RUN_ID" \
            --expected-run-attempt "$SOURCE_RUN_ATTEMPT" \
            --expected-workflow "$SOURCE_WORKFLOW" \
            --expected-head-branch main \
            --expected-head-sha "$SOURCE_SHA" \
            --expected-name "$ARTIFACT_NAME" \
            --report artifacts/trusted-transition-ingested/source-artifact-selection.json \
            --github-output "$GITHUB_OUTPUT"
      - name: Download raw runtime source archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ steps.source-artifact.outputs.artifact-id }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          path: ${{ runner.temp }}/trusted-transition-source-download
          skip-decompress: true
          digest-mismatch: error
      - name: Extract exact runtime source bytes
        run: |
          set -euo pipefail
          python scripts/trusted_transition_artifact.py extract \
            --download-dir "$RUNNER_TEMP/trusted-transition-source-download" \
            --selection artifacts/trusted-transition-ingested/source-artifact-selection.json \
            --output-dir artifacts/trusted-transition-ingested/bundle \
            --report artifacts/trusted-transition-ingested/source-artifact-extraction.json
      - name: Independently observe runtime and live release
        id: runtime-observation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="ibex-evidence-${SOURCE_SHA}"
          ASSET_NAME="proofqa-transition-source-${SOURCE_SHA}.zip"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
            > artifacts/trusted-transition-ingested/live-release.json
          python scripts/github_release_runtime_source.py observe \
            --source-provenance artifacts/trusted-transition-ingested/bundle/source-provenance.json \
            --release-api-json artifacts/trusted-transition-ingested/live-release.json \
            --expected-repository "$GITHUB_REPOSITORY" \
            --expected-repository-id "$REPOSITORY_ID" \
            --expected-commit "$SOURCE_SHA" \
            --expected-runtime-workflow "$SOURCE_WORKFLOW" \
            --expected-runtime-run-id "$SOURCE_RUN_ID" \
            --expected-runtime-run-attempt "$SOURCE_RUN_ATTEMPT" \
            --expected-release-tag "$TAG" \
            --expected-asset-name "$ASSET_NAME" \
            --github-output "$GITHUB_OUTPUT" \
            --report artifacts/trusted-transition-ingested/runtime-observation.json
      - name: Validate exact runtime source
        env:
          DESTINATION_ID: ${{ steps.runtime-observation.outputs.destination-id }}
        run: |
          set -euo pipefail
          test -n "$DESTINATION_ID"
          python scripts/production_transition_source.py \
            --source-dir artifacts/trusted-transition-ingested/bundle \
            --expected-repository "$GITHUB_REPOSITORY" \
            --expected-commit "$SOURCE_SHA" \
            --expected-workflow "$SOURCE_WORKFLOW" \
            --expected-run-id "$SOURCE_RUN_ID" \
            --expected-run-attempt "$SOURCE_RUN_ATTEMPT" \
            --expected-event workflow_run \
            --expected-branch main \
            --expected-environment "$DESTINATION_ENVIRONMENT" \
            --expected-destination-id "$DESTINATION_ID" \
            --report artifacts/trusted-transition-ingested/source-validation.json
      - name: Bind signer observations into attested bundle
        run: |
          set -euo pipefail
          mkdir -p artifacts/trusted-transition-ingested/bundle/signer
          for name in \
            source-artifacts-api.json \
            source-artifact-selection.json \
            source-artifact-extraction.json \
            live-release.json \
            runtime-observation.json \
            source-validation.json
          do
            mv "artifacts/trusted-transition-ingested/$name" \
              "artifacts/trusted-transition-ingested/bundle/signer/$name"
          done
      - name: Build exact final manifest
        run: |
          set -euo pipefail
          python scripts/proofqa_transition_manifest_builder.py \
            --evidence-dir artifacts/trusted-transition-ingested/bundle \
            --output artifacts/trusted-transition-ingested/bundle/manifest.json \
            --report artifacts/trusted-transition-ingested/manifest-build.json
          python scripts/proofqa_transition_manifest.py verify \
            --evidence-dir artifacts/trusted-transition-ingested/bundle \
            --manifest artifacts/trusted-transition-ingested/bundle/manifest.json \
            --transition-report artifacts/trusted-transition-ingested/bundle/transition-report.json \
            --policy require-attested \
            --receipt artifacts/trusted-transition-ingested/pre-attestation-receipt.json
      - name: Generate keyless manifest attestation
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: artifacts/trusted-transition-ingested/bundle/manifest.json
      - name: Preserve exact Sigstore bundle
        env:
          SOURCE_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          test -s "$SOURCE_BUNDLE"
          cp "$SOURCE_BUNDLE" artifacts/trusted-transition-ingested/manifest.sigstore.json
      - name: Require attested runtime evidence through ProofQA
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          transition-report-path: artifacts/trusted-transition-ingested/bundle/transition-report.json
          transition-policy: require-verified
          transition-manifest-policy: require-attested
          transition-evidence-dir: artifacts/trusted-transition-ingested/bundle
          transition-manifest-path: artifacts/trusted-transition-ingested/bundle/manifest.json
          transition-manifest-receipt-path: artifacts/trusted-transition-ingested/manifest-receipt.json
          transition-attestation-bundle-path: artifacts/trusted-transition-ingested/manifest.sigstore.json
          transition-attestation-repository: ${{ github.repository }}
          transition-attestation-signer-workflow: ${{ github.repository }}/.github/workflows/trusted-transition-artifact.yml
          policy-name: github-release-runtime-verification
          max-p95-duration-ms: "1000"
          fail-on: block
          report-path: artifacts/trusted-transition-ingested/proofqa-gate-report.json
      - name: Audit final runtime trust chain
        run: |
          set -euo pipefail
          python scripts/trusted_transition_artifact_audit.py \
            --root-dir artifacts/trusted-transition-ingested \
            --expected-repository "$GITHUB_REPOSITORY" \
            --expected-commit "$SOURCE_SHA" \
            --expected-run-id "$SOURCE_RUN_ID" \
            --expected-run-attempt "$SOURCE_RUN_ATTEMPT" \
            --expected-source-workflow "$SOURCE_WORKFLOW" \
            --expected-signer-workflow "$GITHUB_REPOSITORY/.github/workflows/trusted-transition-artifact.yml" \
            --report artifacts/trusted-transition-ingested/final-audit.json
      - name: Upload signed runtime trust chain
        id: upload-trust-chain
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trusted-transition-ingested-${{ inputs.source_sha }}
          path: artifacts/trusted-transition-ingested
          if-no-files-found: error
          retention-days: 30
      - name: Publish runtime receipt
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_ARTIFACT_ID: ${{ steps.upload-trust-chain.outputs.artifact-id }}
          FINAL_ARTIFACT_URL: ${{ steps.upload-trust-chain.outputs.artifact-url }}
          FINAL_ARTIFACT_DIGEST: ${{ steps.upload-trust-chain.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          python scripts/publish_trusted_artifact_ingestion_receipt.py \
            --audit artifacts/trusted-transition-ingested/final-audit.json \
            --repository "$GITHUB_REPOSITORY" \
            --source-commit "$SOURCE_SHA" \
            --producer-run-id "$GITHUB_RUN_ID" \
            --source-run-id "$SOURCE_RUN_ID" \
            --final-artifact-id "$FINAL_ARTIFACT_ID" \
            --final-artifact-url "$FINAL_ARTIFACT_URL" \
            --final-artifact-digest "$FINAL_ARTIFACT_DIGEST" \
            --output /tmp/trusted-artifact-ingestion-receipt.md
          gh issue comment 42 --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/trusted-artifact-ingestion-receipt.md
