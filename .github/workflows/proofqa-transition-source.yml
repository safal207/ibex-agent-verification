name: ProofQA Transition Source Artifact

on:
  pull_request:
    paths:
      - ".github/workflows/proofqa-transition-source.yml"
      - "scripts/trusted_transition_artifact.py"
      - "scripts/trusted_transition_reference_source.py"
      - "scripts/production_transition_source.py"
      - "tests/test_trusted_transition_artifact*.py"
      - "docs/TRUSTED_TRANSITION_ARTIFACT_INGESTION.md"
  workflow_run:
    workflows: ["ProofQA Release Gate Action"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: proofqa-transition-source-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: |
          python -m unittest -v \
            tests.test_production_transition_source \
            tests.test_trusted_transition_artifact \
            tests.test_trusted_transition_artifact_workflow

  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Require exact green commit
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git diff --exit-code
      - name: Build and validate reference source
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python scripts/trusted_transition_reference_source.py \
            --output-dir artifacts/proofqa-transition-source \
            --repository "$GITHUB_REPOSITORY" \
            --source-commit "$SOURCE_SHA" \
            --workflow .github/workflows/proofqa-transition-source.yml \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --event workflow_run \
            --branch main \
            --subject-path tests/fixtures/proofqa/summary-time-pass.json \
            --report artifacts/proofqa-transition-source-build.json
          python scripts/production_transition_source.py \
            --source-dir artifacts/proofqa-transition-source \
            --expected-repository "$GITHUB_REPOSITORY" \
            --expected-commit "$SOURCE_SHA" \
            --expected-workflow .github/workflows/proofqa-transition-source.yml \
            --expected-run-id "$GITHUB_RUN_ID" \
            --expected-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --expected-event workflow_run \
            --expected-branch main \
            --expected-environment reference \
            --expected-destination-id proofqa:trusted-artifact-ingestion \
            --report artifacts/proofqa-transition-source-validation.json
      - name: Upload exact reference source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: proofqa-transition-source-${{ github.event.workflow_run.head_sha }}
          path: artifacts/proofqa-transition-source
          if-no-files-found: error
          retention-days: 14
