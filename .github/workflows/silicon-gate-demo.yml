name: Silicon Evidence Gate Demo

on:
  push:
    branches: [main]
    paths:
      - "src/ibex_agent_verification/silicon_gate.py"
      - "src/ibex_agent_verification/cli.py"
      - "scripts/run_silicon_gate_demo.sh"
      - ".github/workflows/silicon-gate-demo.yml"
      - "docs/SILICON_GATE_DEMO.md"
  pull_request:
    paths:
      - "src/ibex_agent_verification/silicon_gate.py"
      - "src/ibex_agent_verification/cli.py"
      - "scripts/run_silicon_gate_demo.sh"
      - ".github/workflows/silicon-gate-demo.yml"
      - "docs/SILICON_GATE_DEMO.md"

permissions:
  contents: read

jobs:
  evidence-gate-demo:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Run ALLOW and BLOCK evidence scenarios
        run: bash scripts/run_silicon_gate_demo.sh

      - name: Show decision summary
        run: python -m json.tool artifacts/silicon-gate-demo/demo-summary.json

      - name: Upload reviewable demo evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silicon-evidence-gate-demo-${{ github.sha }}
          path: artifacts/silicon-gate-demo/
          if-no-files-found: error
          retention-days: 14
