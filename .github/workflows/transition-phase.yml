name: Transition Phase Contract

on:
  pull_request:
    paths:
      - ".github/workflows/transition-phase.yml"
      - "src/ibex_agent_verification/transition_phase.py"
      - "src/ibex_agent_verification/cli.py"
      - "tests/test_transition_phase.py"
      - "examples/transition-phase/**"
      - "docs/TRANSITION_PHASE_CONTRACT.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/transition-phase.yml"
      - "src/ibex_agent_verification/transition_phase.py"
      - "src/ibex_agent_verification/cli.py"
      - "tests/test_transition_phase.py"
      - "examples/transition-phase/**"
      - "docs/TRANSITION_PHASE_CONTRACT.md"

permissions:
  contents: read

jobs:
  transition-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out transition verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install verification CLI
        run: python -m pip install -e .

      - name: Verify converged transition
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ibex-av verify-transition-phase \
            --record examples/transition-phase/payment-recovery-verified.json \
            --report artifacts/transition-verified.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/transition-verified.json").read_text())
          assert report["status"] == "VERIFIED"
          assert report["phase"] == "REFLECT"
          assert report["next_phase"] == "CONTINUE"
          assert {axis["status"] for axis in report["axes"].values()} == {"PASS"}
          PY

      - name: Verify expanding transition exit code
        shell: bash
        run: |
          set -uo pipefail
          set +e
          ibex-av verify-transition-phase \
            --record examples/transition-phase/expanding.json \
            --report artifacts/transition-in-progress.json
          rc=$?
          set -e
          [[ "$rc" -eq 1 ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/transition-in-progress.json").read_text())
          assert report["status"] == "IN_PROGRESS"
          assert report["phase"] == "EXPAND"
          assert report["next_phase"] == "COMMIT"
          PY

      - name: Verify missing-step recalibration exit code
        shell: bash
        run: |
          set -uo pipefail
          set +e
          ibex-av verify-transition-phase \
            --record examples/transition-phase/recalibrate-missing-step.json \
            --report artifacts/transition-recalibrate.json
          rc=$?
          set -e
          [[ "$rc" -eq 3 ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/transition-recalibrate.json").read_text())
          assert report["status"] == "RECALIBRATE"
          assert report["phase"] == "RECALIBRATE"
          assert report["next_phase"] == "CALIBRATE"
          assert "commit_without_concrete_step" in report["issues"]
          assert report["axes"]["intention"]["status"] == "BLOCK"
          PY

      - name: Verify malformed schema fails closed
        shell: bash
        run: |
          set -uo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(
              Path("examples/transition-phase/payment-recovery-verified.json").read_text()
          )
          source["intention"]["hidden_motive"] = "must-not-be-inferred"
          Path("artifacts/transition-invalid.json").write_text(json.dumps(source))
          PY
          set +e
          ibex-av verify-transition-phase \
            --record artifacts/transition-invalid.json \
            --report artifacts/transition-invalid-report.json
          rc=$?
          set -e
          [[ "$rc" -eq 2 ]]
          [[ ! -e artifacts/transition-invalid-report.json ]]

      - name: Upload transition reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: transition-phase-reports-${{ github.sha }}
          path: |
            artifacts/transition-verified.json
            artifacts/transition-in-progress.json
            artifacts/transition-recalibrate.json
          if-no-files-found: error
          retention-days: 14
