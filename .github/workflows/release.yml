name: Publish Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact green commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          tag="v${version}"
          notes="docs/releases/${tag}.md"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Unsupported release version: $version" >&2
            exit 2
          }
          [[ -s "$notes" ]] || {
            echo "Missing release notes: $notes" >&2
            exit 2
          }

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Refuse to move an existing release tag
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > tag-ref.json 2>/dev/null; then
            actual_sha="$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('tag-ref.json').read_text(encoding='utf-8'))
          print(data['object']['sha'])
          PY
            )"
            [[ "$actual_sha" == "$EXPECTED_SHA" ]] || {
              echo "Existing tag $TAG points to $actual_sha, expected $EXPECTED_SHA; refusing to retarget." >&2
              exit 1
            }
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          NOTES: ${{ steps.release.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_SHA" \
            --title "$TAG — Reusable Silicon Evidence Gate" \
            --notes-file "$NOTES" \
            --latest

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,url,targetCommitish \
            > release.json
          python3 - "$TAG" "$EXPECTED_SHA" <<'PY'
          import json
          import sys
          from pathlib import Path

          tag, expected_sha = sys.argv[1:]
          data = json.loads(Path('release.json').read_text(encoding='utf-8'))
          if data['tagName'] != tag:
              raise SystemExit(f"Unexpected tag: {data['tagName']}")
          if data['isDraft'] or data['isPrerelease']:
              raise SystemExit('Release must be published and stable')
          if data['targetCommitish'] not in {expected_sha, 'main'}:
              raise SystemExit(
                  f"Unexpected targetCommitish: {data['targetCommitish']}"
              )
          print(json.dumps(data, indent=2, sort_keys=True))
PY
