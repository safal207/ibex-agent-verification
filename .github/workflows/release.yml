name: Publish Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "pyproject.toml"
      - "docs/releases/**"
      - "docs/evidence/releases/**"
      - "scripts/build_release_evidence_asset.py"
      - "scripts/verify_release_asset_copy.py"
      - "scripts/release_asset_sidecars.py"
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check out release candidate
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification project
        run: python -m pip install -e .

      - name: Validate release metadata and evidence assets
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          notes="docs/releases/${tag}.md"
          source="docs/evidence/releases/${tag}/cerebras-live"
          asset_name="${tag}-cerebras-live-evidence.zip"
          first="artifacts/${tag}-cerebras-live-evidence-first.zip"
          second="artifacts/${tag}-cerebras-live-evidence-second.zip"
          first_checksum="${first}.sha256"
          second_checksum="${second}.sha256"
          first_provenance="${first}.provenance.json"
          second_provenance="${second}.provenance.json"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ -s "$notes" ]]
          grep -Fq "$tag" "$notes"

          if [[ -d "$source" ]]; then
            python scripts/build_release_evidence_asset.py --source "$source" --output "$first"
            python scripts/build_release_evidence_asset.py --source "$source" --output "$second"
            python scripts/verify_release_asset_copy.py \
              --expected "$first" \
              --actual "$second"

            python scripts/release_asset_sidecars.py write \
              --asset "$first" \
              --subject-name "$asset_name" \
              --checksum "$first_checksum" \
              --provenance "$first_provenance" \
              --repository "$GITHUB_REPOSITORY" \
              --commit "${{ github.event.pull_request.head.sha }}" \
              --tag "$tag" \
              --workflow ".github/workflows/release.yml"
            python scripts/release_asset_sidecars.py write \
              --asset "$second" \
              --subject-name "$asset_name" \
              --checksum "$second_checksum" \
              --provenance "$second_provenance" \
              --repository "$GITHUB_REPOSITORY" \
              --commit "${{ github.event.pull_request.head.sha }}" \
              --tag "$tag" \
              --workflow ".github/workflows/release.yml"

            cmp "$first_checksum" "$second_checksum"
            cmp "$first_provenance" "$second_provenance"
            python scripts/release_asset_sidecars.py verify \
              --asset "$second" \
              --subject-name "$asset_name" \
              --checksum "$second_checksum" \
              --provenance "$second_provenance" \
              --repository "$GITHUB_REPOSITORY" \
              --commit "${{ github.event.pull_request.head.sha }}" \
              --tag "$tag" \
              --workflow ".github/workflows/release.yml"
          fi

          echo "Validated release candidate $tag"

  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact green commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification project
        run: python -m pip install -e .

      - name: Resolve release metadata and build assets
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          notes="docs/releases/${tag}.md"
          source="docs/evidence/releases/${tag}/cerebras-live"
          asset=""
          checksum=""
          provenance=""

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Unsupported release version: $version" >&2
            exit 2
          }
          [[ -s "$notes" ]] || {
            echo "Missing release notes: $notes" >&2
            exit 2
          }

          if [[ -d "$source" ]]; then
            asset="artifacts/${tag}-cerebras-live-evidence.zip"
            checksum="${asset}.sha256"
            provenance="${asset}.provenance.json"
            python scripts/build_release_evidence_asset.py --source "$source" --output "$asset"
            python scripts/release_asset_sidecars.py write \
              --asset "$asset" \
              --subject-name "$(basename "$asset")" \
              --checksum "$checksum" \
              --provenance "$provenance" \
              --repository "$GITHUB_REPOSITORY" \
              --commit "${{ github.event.workflow_run.head_sha }}" \
              --tag "$tag" \
              --workflow ".github/workflows/release.yml"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"
          echo "provenance=$provenance" >> "$GITHUB_OUTPUT"

      - name: Inspect existing release tag
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          CURRENT_SHA: ${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if actual_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha' 2>/dev/null)"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "actual_sha=$actual_sha" >> "$GITHUB_OUTPUT"
            if [[ "$actual_sha" == "$CURRENT_SHA" ]]; then
              echo "same_commit=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Release tag $TAG already points to this commit; verifying the existing release."
            else
              echo "same_commit=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Release tag $TAG already exists at $actual_sha; current commit is $CURRENT_SHA. Version was not bumped, so publishing is a successful no-op."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "actual_sha=" >> "$GITHUB_OUTPUT"
            echo "same_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          NOTES: ${{ steps.release.outputs.notes }}
          ASSET: ${{ steps.release.outputs.asset }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
          PROVENANCE: ${{ steps.release.outputs.provenance }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "$TAG"
            --repo "$GITHUB_REPOSITORY"
            --target "$RELEASE_SHA"
            --title "$TAG — Dual-Rail Evidence Milestone"
            --notes-file "$NOTES"
            --latest
          )
          if [[ -n "$ASSET" ]]; then
            args+=(
              "$ASSET#Cerebras live evidence bundle"
              "$CHECKSUM#SHA-256 checksum"
              "$PROVENANCE#Release asset provenance"
            )
          fi
          gh release create "${args[@]}"

      - name: Verify release and downloaded assets
        if: >-
          steps.existing.outputs.exists == 'false' ||
          steps.existing.outputs.same_commit == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
          ASSET: ${{ steps.release.outputs.asset }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
          PROVENANCE: ${{ steps.release.outputs.provenance }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" == "$TAG" ]]
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" == "false" ]]
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')" == "false" ]]
          actual_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')"
          [[ "$actual_sha" == "$EXPECTED_SHA" ]]

          if [[ -n "$ASSET" ]]; then
            asset_name="$(basename "$ASSET")"
            checksum_name="$(basename "$CHECKSUM")"
            provenance_name="$(basename "$PROVENANCE")"
            release_assets="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
            grep -Fx "$asset_name" <<< "$release_assets"
            grep -Fx "$checksum_name" <<< "$release_assets"
            grep -Fx "$provenance_name" <<< "$release_assets"

            download_dir="$(mktemp -d)"
            downloaded_asset="$download_dir/$asset_name"
            downloaded_checksum="$download_dir/$checksum_name"
            downloaded_provenance="$download_dir/$provenance_name"
            asset_report="artifacts/${TAG}-release-asset-verification.json"
            checksum_copy_report="artifacts/${TAG}-release-checksum-copy-verification.json"
            provenance_copy_report="artifacts/${TAG}-release-provenance-copy-verification.json"
            metadata_report="artifacts/${TAG}-release-metadata-verification.json"

            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$asset_name" --dir "$download_dir"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$checksum_name" --dir "$download_dir"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$provenance_name" --dir "$download_dir"

            python scripts/verify_release_asset_copy.py \
              --expected "$ASSET" \
              --actual "$downloaded_asset" \
              --report "$asset_report"
            python scripts/verify_release_asset_copy.py \
              --expected "$CHECKSUM" \
              --actual "$downloaded_checksum" \
              --report "$checksum_copy_report"
            python scripts/verify_release_asset_copy.py \
              --expected "$PROVENANCE" \
              --actual "$downloaded_provenance" \
              --report "$provenance_copy_report"
            python scripts/release_asset_sidecars.py verify \
              --asset "$downloaded_asset" \
              --subject-name "$asset_name" \
              --checksum "$downloaded_checksum" \
              --provenance "$downloaded_provenance" \
              --repository "$GITHUB_REPOSITORY" \
              --commit "$EXPECTED_SHA" \
              --tag "$TAG" \
              --workflow ".github/workflows/release.yml" \
              --report "$metadata_report"

            {
              echo "### Release asset integrity"
              for report in \
                "$asset_report" \
                "$checksum_copy_report" \
                "$provenance_copy_report" \
                "$metadata_report"; do
                echo
                echo "#### $(basename "$report")"
                echo '```json'
                cat "$report"
                echo '```'
              done
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName,url,targetCommitish,assets

      - name: Verify existing older release is readable
        if: >-
          steps.existing.outputs.exists == 'true' &&
          steps.existing.outputs.same_commit == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" == "$TAG" ]]
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" == "false" ]]
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName,url,targetCommitish,assets
