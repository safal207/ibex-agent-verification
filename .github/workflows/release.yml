name: Publish Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "pyproject.toml"
      - "docs/releases/**"
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check out release candidate
        uses: actions/checkout@v4

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          notes="docs/releases/${tag}.md"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ -s "$notes" ]]
          grep -Fq "$tag" "$notes"
          echo "Validated release candidate $tag"

  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out the exact green commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          notes="docs/releases/${tag}.md"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Unsupported release version: $version" >&2
            exit 2
          }
          [[ -s "$notes" ]] || {
            echo "Missing release notes: $notes" >&2
            exit 2
          }

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Refuse to move an existing release tag
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if actual_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha' 2>/dev/null)"; then
            [[ "$actual_sha" == "$EXPECTED_SHA" ]] || {
              echo "Existing tag $TAG points to $actual_sha, expected $EXPECTED_SHA; refusing to retarget." >&2
              exit 1
            }
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          NOTES: ${{ steps.release.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_SHA" \
            --title "$TAG — Reusable Silicon Evidence Gate" \
            --notes-file "$NOTES" \
            --latest

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_SHA: ${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" == "$TAG" ]]
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" == "false" ]]
          [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')" == "false" ]]
          actual_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')"
          [[ "$actual_sha" == "$EXPECTED_SHA" ]]
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName,url,targetCommitish
