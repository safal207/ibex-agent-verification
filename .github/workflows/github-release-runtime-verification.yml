name: GitHub Release Runtime Verification

on:
  pull_request:
    paths:
      - ".github/workflows/github-release-runtime-verification.yml"
      - ".github/workflows/trusted-transition-artifact.yml"
      - "scripts/github_release_runtime_source.py"
      - "scripts/capture_runtime_install.py"
      - "tests/test_github_release_runtime_source.py"
      - "pyproject.toml"
      - "src/ibex_agent_verification/**"
  workflow_run:
    workflows: ["GitHub Release Production Deployment"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: github-release-runtime-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Test runtime contracts
        run: python -m unittest -v tests.test_github_release_runtime_source tests.test_github_release_production_source tests.test_production_transition_source tests.test_trusted_transition_artifact_workflow
      - name: Build exact PR wheel
        id: pr-wheel
        run: |
          set -euo pipefail
          python -m pip wheel . --no-deps --wheel-dir "$RUNNER_TEMP/pr-wheelhouse"
          test "$(find "$RUNNER_TEMP/pr-wheelhouse" -maxdepth 1 -name '*.whl' -type f | wc -l)" -eq 1
          echo "wheel=$(find "$RUNNER_TEMP/pr-wheelhouse" -maxdepth 1 -name '*.whl' -type f -print)" >> "$GITHUB_OUTPUT"
      - name: Install exact PR wheel without dependency resolution
        env:
          WHEEL: ${{ steps.pr-wheel.outputs.wheel }}
        run: |
          python -m venv "$RUNNER_TEMP/pr-runtime-venv"
          "$RUNNER_TEMP/pr-runtime-venv/bin/python" -m pip install --no-index --no-deps "$WHEEL"
      - name: Verify installed PR package and CLI
        run: |
          "$RUNNER_TEMP/pr-runtime-venv/bin/python" -I -c 'import importlib.metadata as m; assert m.version("ibex-agent-verification") == "0.8.1"'
          "$RUNNER_TEMP/pr-runtime-venv/bin/ibex-av" --help >/dev/null

  execute:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: ibex-runtime-verification
    permissions:
      contents: read
      actions: read
    env:
      PROMOTION_WORKFLOW: .github/workflows/ibex-evidence-promotion.yml
      RUNTIME_WORKFLOW: .github/workflows/github-release-runtime-verification.yml
      PACKAGE_VERSION: "0.8.1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - name: Require immutable deployment trigger
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git diff --exit-code
      - name: Download public release asset
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/github-release-runtime-reports "$RUNNER_TEMP/live-release"
          gh api "/repos/$GITHUB_REPOSITORY/releases/tags/ibex-evidence-${SOURCE_SHA}" > artifacts/github-release-runtime-reports/release.json
          gh release download "ibex-evidence-${SOURCE_SHA}" --repo "$GITHUB_REPOSITORY" --pattern "proofqa-transition-source-${SOURCE_SHA}.zip" --dir "$RUNNER_TEMP/live-release"
      - name: Extract live release bytes
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          python scripts/github_release_runtime_source.py extract --release-api-json artifacts/github-release-runtime-reports/release.json --release-download-dir "$RUNNER_TEMP/live-release" --output-dir "$RUNNER_TEMP/live-runtime-source" --expected-repository "$GITHUB_REPOSITORY" --expected-repository-id "$REPOSITORY_ID" --expected-commit "$SOURCE_SHA" --expected-release-tag "ibex-evidence-${SOURCE_SHA}" --expected-asset-name "proofqa-transition-source-${SOURCE_SHA}.zip" --report artifacts/github-release-runtime-reports/live-release-extraction.json
      - name: Build runtime manifest
        run: |
          cp -a "$RUNNER_TEMP/live-runtime-source" "$RUNNER_TEMP/runtime-bundle"
          python scripts/proofqa_transition_manifest_builder.py --evidence-dir "$RUNNER_TEMP/runtime-bundle" --output "$RUNNER_TEMP/runtime-bundle/manifest.json" --report artifacts/github-release-runtime-reports/runtime-manifest-build.json
      - name: Build and install exact wheel
        id: wheel
        run: |
          set -euo pipefail
          python -m pip wheel . --no-deps --wheel-dir "$RUNNER_TEMP/runtime-wheelhouse"
          WHEEL="$(find "$RUNNER_TEMP/runtime-wheelhouse" -maxdepth 1 -name '*.whl' -type f -print)"
          test -n "$WHEEL"
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$WHEEL")" >> "$GITHUB_OUTPUT"
          echo "sha256=sha256:$(sha256sum "$WHEEL" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          python -m venv "$RUNNER_TEMP/runtime-venv"
          "$RUNNER_TEMP/runtime-venv/bin/python" -m pip install --no-index --no-deps "$WHEEL"
          "$RUNNER_TEMP/runtime-venv/bin/python" -I -c 'import importlib.metadata as m; assert m.version("ibex-agent-verification") == "0.8.1"'
      - name: Capture install and execute installed CLI
        env:
          WHEEL_FILENAME: ${{ steps.wheel.outputs.filename }}
          WHEEL_SHA256: ${{ steps.wheel.outputs.sha256 }}
        run: |
          set -euo pipefail
          P="$RUNNER_TEMP/runtime-venv/bin/python"
          python scripts/capture_runtime_install.py --wheel-filename "$WHEEL_FILENAME" --wheel-sha256 "$WHEEL_SHA256" --package-version "$PACKAGE_VERSION" --python-version "$($P -I -c 'import sys; print(".".join(map(str,sys.version_info[:3])))')" --python-executable "$($P -I -c 'import sys; print(sys.executable)')" --sys-prefix "$($P -I -c 'import sys; print(sys.prefix)')" --sys-base-prefix "$($P -I -c 'import sys; print(sys.base_prefix)')" --module-file "$($P -I -c 'import importlib.util; print(importlib.util.find_spec("ibex_agent_verification").origin)')" --output artifacts/github-release-runtime-reports/runtime-install.json
          "$RUNNER_TEMP/runtime-venv/bin/ibex-av" verify-evidence --manifest "$RUNNER_TEMP/runtime-bundle/manifest.json" --evidence-dir "$RUNNER_TEMP/runtime-bundle" --report artifacts/github-release-runtime-reports/runtime-cli-report.json
      - name: Build and validate runtime source
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
          WHEEL: ${{ steps.wheel.outputs.wheel }}
        run: |
          set -euo pipefail
          python scripts/github_release_runtime_source.py build --source-dir "$RUNNER_TEMP/live-runtime-source" --release-api-json artifacts/github-release-runtime-reports/release.json --release-download-dir "$RUNNER_TEMP/live-release" --runtime-bundle-dir "$RUNNER_TEMP/runtime-bundle" --runtime-manifest "$RUNNER_TEMP/runtime-bundle/manifest.json" --wheel "$WHEEL" --install-report artifacts/github-release-runtime-reports/runtime-install.json --cli-report artifacts/github-release-runtime-reports/runtime-cli-report.json --output-dir artifacts/github-release-runtime-source --expected-repository "$GITHUB_REPOSITORY" --expected-repository-id "$REPOSITORY_ID" --expected-commit "$SOURCE_SHA" --expected-promotion-workflow "$PROMOTION_WORKFLOW" --expected-release-tag "ibex-evidence-${SOURCE_SHA}" --expected-asset-name "proofqa-transition-source-${SOURCE_SHA}.zip" --expected-package-version "$PACKAGE_VERSION" --runtime-workflow "$RUNTIME_WORKFLOW" --runtime-run-id "$GITHUB_RUN_ID" --runtime-run-attempt "$GITHUB_RUN_ATTEMPT" --report artifacts/github-release-runtime-reports/runtime-source-build.json
          DESTINATION_ID="github-actions:repository-id:${REPOSITORY_ID}:environment:ibex-runtime-verification:workflow-run:${GITHUB_RUN_ID}:attempt:${GITHUB_RUN_ATTEMPT}:runner:github-hosted-ubuntu-24.04"
          python scripts/production_transition_source.py --source-dir artifacts/github-release-runtime-source --expected-repository "$GITHUB_REPOSITORY" --expected-commit "$SOURCE_SHA" --expected-workflow "$RUNTIME_WORKFLOW" --expected-run-id "$GITHUB_RUN_ID" --expected-run-attempt "$GITHUB_RUN_ATTEMPT" --expected-event workflow_run --expected-branch main --expected-environment ibex-runtime-verification --expected-destination-id "$DESTINATION_ID" --report artifacts/github-release-runtime-reports/runtime-source-validation.json
      - name: Upload exact runtime transition source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: proofqa-transition-source-${{ github.event.workflow_run.head_sha }}
          path: artifacts/github-release-runtime-source
          if-no-files-found: error
          retention-days: 30
      - name: Upload runtime execution audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: github-release-runtime-audit-${{ github.event.workflow_run.head_sha }}
          path: artifacts/github-release-runtime-reports
          if-no-files-found: error
          retention-days: 30
