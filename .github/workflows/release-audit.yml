name: Independent Release Audit

on:
  pull_request:
    paths:
      - ".github/workflows/release-audit.yml"
      - "scripts/audit_published_release.py"
      - "tests/test_audit_published_release.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-audit.yml"
      - "scripts/audit_published_release.py"
      - "tests/test_audit_published_release.py"
  workflow_dispatch:
    inputs:
      tag:
        description: "Published semantic release tag to audit"
        required: true
        default: "v0.8.1"
        type: string

permissions:
  contents: read
  attestations: read

concurrency:
  group: independent-release-audit-${{ github.event.pull_request.head.sha || github.sha }}-${{ inputs.tag || 'project-version' }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out auditor only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install verification project
        run: python -m pip install -e .

      - name: Resolve immutable release identity
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${REQUESTED_TAG:-}" ]]; then
            tag="$REQUESTED_TAG"
          else
            version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            tag="v${version}"
          fi
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq '.sha')"
          [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Require exact public Release asset set
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          asset="${TAG}-cerebras-live-evidence.zip"
          expected="$(printf '%s\n' \
            "$asset" \
            "${asset}.sha256" \
            "${asset}.provenance.json" \
            "${TAG}-release-attestation.sigstore.json" | sort)"
          observed="$(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets,isDraft,isPrerelease,tagName \
            --jq 'select(.tagName == env.TAG and .isDraft == false and .isPrerelease == false) | .assets[].name' | sort)"
          [[ "$observed" == "$expected" ]] || {
            echo "Expected assets:" >&2
            printf '%s\n' "$expected" >&2
            echo "Observed assets:" >&2
            printf '%s\n' "$observed" >&2
            exit 1
          }

      - name: Download published files as an external consumer
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-download audit-reports
          asset="${TAG}-cerebras-live-evidence.zip"
          for name in \
            "$asset" \
            "${asset}.sha256" \
            "${asset}.provenance.json" \
            "${TAG}-release-attestation.sigstore.json"; do
            gh release download "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$name" \
              --dir audit-download
            [[ -s "audit-download/$name" ]]
          done

      - name: Audit bytes, provenance, archive safety, and embedded manifest
        env:
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/audit_published_release.py \
            --directory audit-download \
            --tag "$TAG" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$RELEASE_COMMIT" \
            --workflow ".github/workflows/release.yml" \
            --report audit-reports/release-audit.json

      - name: Verify each attested subject online and from the published bundle
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          asset="${TAG}-cerebras-live-evidence.zip"
          bundle="audit-download/${TAG}-release-attestation.sigstore.json"
          signer_workflow="$GITHUB_REPOSITORY/.github/workflows/release.yml"
          subjects=(
            "$asset"
            "${asset}.sha256"
            "${asset}.provenance.json"
          )
          for name in "${subjects[@]}"; do
            label="${name//[^A-Za-z0-9]/_}"
            gh attestation verify "audit-download/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --deny-self-hosted-runners \
              --format json > "audit-reports/${label}-online.json"
            gh attestation verify "audit-download/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --deny-self-hosted-runners \
              --bundle "$bundle" \
              --format json > "audit-reports/${label}-bundled.json"
          done

      - name: Publish human-readable audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Independent published Release audit"
            echo
            for report in audit-reports/*.json; do
              [[ -f "$report" ]] || continue
              echo "### $(basename "$report")"
              echo '```json'
              cat "$report"
              echo '```'
              echo
            done
          } >> "$GITHUB_STEP_SUMMARY"
