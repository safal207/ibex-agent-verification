name: ProofQA Release Gate Action

on:
  pull_request:
    paths:
      - ".github/workflows/proofqa-action.yml"
      - "proofqa/action.yml"
      - "scripts/proofqa_gate.py"
      - "scripts/proofqa_gate_v3.py"
      - "scripts/proofqa_gate_v4.py"
      - "scripts/proofqa_gate_v5.py"
      - "scripts/proofqa_transition_preflight.py"
      - "scripts/proofqa_transition_manifest.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "tests/test_proofqa*.py"
      - "tests/fixtures/proofqa/**"
      - "docs/PROOFQA_GITHUB_ACTION.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/proofqa-action.yml"
      - "proofqa/action.yml"
      - "scripts/proofqa_gate.py"
      - "scripts/proofqa_gate_v3.py"
      - "scripts/proofqa_gate_v4.py"
      - "scripts/proofqa_gate_v5.py"
      - "scripts/proofqa_transition_preflight.py"
      - "scripts/proofqa_transition_manifest.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "tests/test_proofqa*.py"
      - "tests/fixtures/proofqa/**"
      - "docs/PROOFQA_GITHUB_ACTION.md"

permissions:
  contents: read
  attestations: read

jobs:
  action-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out action source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: PASS time decision
        id: pass
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          policy-name: mobile-production
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          report-path: artifacts/proofqa-time-pass.json

      - name: Verify PASS outputs
        env:
          DECISION: ${{ steps.pass.outputs.decision }}
          SHOULD_FAIL: ${{ steps.pass.outputs.should-fail }}
          END_TO_END: ${{ steps.pass.outputs.end-to-end-percent }}
          COMPLETION: ${{ steps.pass.outputs.completion-reliability-percent }}
          P95_MS: ${{ steps.pass.outputs.p95-duration-ms }}
          TRANSITION_STATUS: ${{ steps.pass.outputs.transition-status }}
          MANIFEST_STATUS: ${{ steps.pass.outputs.transition-manifest-status }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$END_TO_END" == "100.000000" ]]
          [[ "$COMPLETION" == "100.000000" ]]
          [[ "$P95_MS" == "700.000000" ]]
          [[ "$TRANSITION_STATUS" == "n/a" ]]
          [[ "$MANIFEST_STATUS" == "n/a" ]]
          [[ -s artifacts/proofqa-time-pass.json ]]

      - name: WARN time decision without failing block-only enforcement
        id: warn
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-warn.json
          policy-name: mobile-canary
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          fail-on: block
          report-path: artifacts/proofqa-time-warn.json

      - name: Verify WARN outputs
        env:
          DECISION: ${{ steps.warn.outputs.decision }}
          SHOULD_FAIL: ${{ steps.warn.outputs.should-fail }}
          P95_MS: ${{ steps.warn.outputs.p95-duration-ms }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "WARN" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$P95_MS" == "900.000000" ]]
          [[ -s artifacts/proofqa-time-warn.json ]]

      - name: BLOCK time decision fails the action
        id: block
        continue-on-error: true
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-block.json
          policy-name: strict-mobile-production
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          report-path: artifacts/proofqa-time-block.json

      - name: Verify BLOCK enforcement
        env:
          STEP_OUTCOME: ${{ steps.block.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$STEP_OUTCOME" == "failure" ]]
          [[ -s artifacts/proofqa-time-block.json ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-time-block.json").read_text())
          assert report["decision"] == "BLOCK"
          blocked = [f for f in report["findings"] if f["status"] == "BLOCK"]
          assert [f["axis"] for f in blocked] == ["time_performance"]
          PY

      - name: Preserve v2 compatibility with transition and manifest gates disabled
        id: legacy
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-pass.json
          max-p95-duration-ms: "0"
          transition-policy: ignore
          transition-manifest-policy: ignore
          report-path: artifacts/proofqa-v2-compatible.json

      - name: Verify v2 compatibility
        env:
          DECISION: ${{ steps.legacy.outputs.decision }}
          P95_MS: ${{ steps.legacy.outputs.p95-duration-ms }}
          TRANSITION_STATUS: ${{ steps.legacy.outputs.transition-status }}
          MANIFEST_STATUS: ${{ steps.legacy.outputs.transition-manifest-status }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$P95_MS" == "n/a" ]]
          [[ "$TRANSITION_STATUS" == "n/a" ]]
          [[ "$MANIFEST_STATUS" == "n/a" ]]

      - name: Require VERIFIED transition
        id: transition-pass
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-verified.json
          transition-policy: require-verified
          report-path: artifacts/proofqa-transition-pass.json

      - name: Verify transition PASS outputs
        env:
          DECISION: ${{ steps.transition-pass.outputs.decision }}
          TRANSITION_STATUS: ${{ steps.transition-pass.outputs.transition-status }}
          TRANSITION_PHASE: ${{ steps.transition-pass.outputs.transition-phase }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$TRANSITION_STATUS" == "VERIFIED" ]]
          [[ "$TRANSITION_PHASE" == "REFLECT" ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-transition-pass.json").read_text())
          assert report["schema_version"] == 4
          assert report["transition"]["status"] == "VERIFIED"
          assert report["transition_manifest"] is None
          PY

      - name: Warn on unfinished transition during adoption
        id: transition-warn
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-in-progress.json
          transition-policy: warn
          fail-on: block
          report-path: artifacts/proofqa-transition-warn.json

      - name: Verify transition WARN outputs
        env:
          DECISION: ${{ steps.transition-warn.outputs.decision }}
          SHOULD_FAIL: ${{ steps.transition-warn.outputs.should-fail }}
          TRANSITION_STATUS: ${{ steps.transition-warn.outputs.transition-status }}
          TRANSITION_PHASE: ${{ steps.transition-warn.outputs.transition-phase }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "WARN" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$TRANSITION_STATUS" == "IN_PROGRESS" ]]
          [[ "$TRANSITION_PHASE" == "EXPAND" ]]

      - name: Block recalibration under strict transition policy
        id: transition-block
        continue-on-error: true
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-recalibrate.json
          transition-policy: require-verified
          report-path: artifacts/proofqa-transition-block.json

      - name: Verify transition BLOCK is isolated from model axes
        env:
          STEP_OUTCOME: ${{ steps.transition-block.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$STEP_OUTCOME" == "failure" ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-transition-block.json").read_text())
          assert report["decision"] == "BLOCK"
          blocked = [f for f in report["findings"] if f["status"] == "BLOCK"]
          assert [f["axis"] for f in blocked] == ["transition_phase"]
          PY

      - name: Require manifest-bound VERIFIED transition
        id: manifest-pass
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-manifest-bundle/transition-report.json
          transition-policy: require-verified
          transition-manifest-policy: verify
          transition-evidence-dir: tests/fixtures/proofqa/transition-manifest-bundle
          transition-manifest-path: tests/fixtures/proofqa/transition-manifest-bundle/manifest.json
          transition-manifest-receipt-path: artifacts/proofqa-transition-manifest-receipt.json
          report-path: artifacts/proofqa-transition-manifest-pass.json

      - name: Verify manifest-bound outputs and hashes
        env:
          DECISION: ${{ steps.manifest-pass.outputs.decision }}
          TRANSITION_STATUS: ${{ steps.manifest-pass.outputs.transition-status }}
          MANIFEST_STATUS: ${{ steps.manifest-pass.outputs.transition-manifest-status }}
          MANIFEST_SHA: ${{ steps.manifest-pass.outputs.transition-manifest-sha256 }}
          RECEIPT_SHA: ${{ steps.manifest-pass.outputs.transition-manifest-receipt-sha256 }}
          ATTESTATION_STATUS: ${{ steps.manifest-pass.outputs.transition-attestation-status }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$TRANSITION_STATUS" == "VERIFIED" ]]
          [[ "$MANIFEST_STATUS" == "VERIFIED" ]]
          [[ "$MANIFEST_SHA" == "3a484ffadf87d61b4f98a8dbbd8cb312407dcafa0aedee79aec56cbc01d4e4b5" ]]
          [[ "$RECEIPT_SHA" =~ ^[0-9a-f]{64}$ ]]
          [[ "$ATTESTATION_STATUS" == "NOT_REQUIRED" ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-transition-manifest-pass.json").read_text())
          assert report["schema_version"] == 4
          assert report["transition_manifest"]["files_checked"] == 5
          refs = report["transition_manifest"]["references"]
          assert sum(value is not None for value in refs.values()) == 4
          assert report["source"]["transition_manifest_sha256"] == "3a484ffadf87d61b4f98a8dbbd8cb312407dcafa0aedee79aec56cbc01d4e4b5"
          PY

      - name: Prepare tampered manifest fixture
        shell: bash
        run: |
          set -euo pipefail
          cp -a tests/fixtures/proofqa/transition-manifest-bundle artifacts/tampered-transition-bundle
          printf ' ' >> artifacts/tampered-transition-bundle/evidence/result.json

      - name: Reject tampered manifest-bound evidence before gate report
        id: manifest-tampered
        continue-on-error: true
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          transition-report-path: artifacts/tampered-transition-bundle/transition-report.json
          transition-policy: require-verified
          transition-manifest-policy: verify
          transition-evidence-dir: artifacts/tampered-transition-bundle
          transition-manifest-path: artifacts/tampered-transition-bundle/manifest.json
          transition-manifest-receipt-path: artifacts/tampered-transition-receipt.json
          report-path: artifacts/proofqa-tampered-must-not-exist.json

      - name: Verify tampering failed before policy evaluation
        env:
          STEP_OUTCOME: ${{ steps.manifest-tampered.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$STEP_OUTCOME" == "failure" ]]
          [[ ! -e artifacts/proofqa-tampered-must-not-exist.json ]]
          [[ ! -e artifacts/tampered-transition-receipt.json ]]

      - name: Validate GitHub attestation verification flags
        shell: bash
        run: |
          set -euo pipefail
          help="$(gh attestation verify --help)"
          grep -Fq -- "--repo" <<< "$help"
          grep -Fq -- "--signer-workflow" <<< "$help"
          grep -Fq -- "--deny-self-hosted-runners" <<< "$help"
          grep -Fq -- "--bundle" <<< "$help"
          grep -Fq -- "--format" <<< "$help"

      - name: Upload gate reports and manifest receipts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: proofqa-transition-manifest-reports-${{ github.sha }}
          path: |
            artifacts/proofqa-*.json
            artifacts/proofqa-transition-manifest-receipt.json
          if-no-files-found: error
          retention-days: 14
