name: ProofQA Release Gate Action

on:
  pull_request:
    paths:
      - ".github/workflows/proofqa-action.yml"
      - "proofqa/action.yml"
      - "scripts/proofqa_gate.py"
      - "scripts/proofqa_gate_v3.py"
      - "scripts/proofqa_gate_v4.py"
      - "scripts/proofqa_transition_preflight.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "tests/test_proofqa*.py"
      - "tests/fixtures/proofqa/**"
      - "docs/PROOFQA_GITHUB_ACTION.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/proofqa-action.yml"
      - "proofqa/action.yml"
      - "scripts/proofqa_gate.py"
      - "scripts/proofqa_gate_v3.py"
      - "scripts/proofqa_gate_v4.py"
      - "scripts/proofqa_transition_preflight.py"
      - "src/ibex_agent_verification/qa_scorecard.py"
      - "scripts/qa_benchmark.py"
      - "tests/test_proofqa*.py"
      - "tests/fixtures/proofqa/**"
      - "docs/PROOFQA_GITHUB_ACTION.md"

permissions:
  contents: read

jobs:
  action-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out action source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: PASS time decision
        id: pass
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          policy-name: mobile-production
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          report-path: artifacts/proofqa-time-pass.json

      - name: Verify PASS outputs
        env:
          DECISION: ${{ steps.pass.outputs.decision }}
          SHOULD_FAIL: ${{ steps.pass.outputs.should-fail }}
          END_TO_END: ${{ steps.pass.outputs.end-to-end-percent }}
          COMPLETION: ${{ steps.pass.outputs.completion-reliability-percent }}
          P95_MS: ${{ steps.pass.outputs.p95-duration-ms }}
          TRANSITION_STATUS: ${{ steps.pass.outputs.transition-status }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$END_TO_END" == "100.000000" ]]
          [[ "$COMPLETION" == "100.000000" ]]
          [[ "$P95_MS" == "700.000000" ]]
          [[ "$TRANSITION_STATUS" == "n/a" ]]
          [[ -s artifacts/proofqa-time-pass.json ]]

      - name: WARN time decision without failing block-only enforcement
        id: warn
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-warn.json
          policy-name: mobile-canary
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          fail-on: block
          report-path: artifacts/proofqa-time-warn.json

      - name: Verify WARN outputs
        env:
          DECISION: ${{ steps.warn.outputs.decision }}
          SHOULD_FAIL: ${{ steps.warn.outputs.should-fail }}
          P95_MS: ${{ steps.warn.outputs.p95-duration-ms }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "WARN" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$P95_MS" == "900.000000" ]]
          [[ -s artifacts/proofqa-time-warn.json ]]

      - name: BLOCK time decision fails the action
        id: block
        continue-on-error: true
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-block.json
          policy-name: strict-mobile-production
          max-p95-duration-ms: "1000"
          time-warn-margin-ms: "250"
          report-path: artifacts/proofqa-time-block.json

      - name: Verify BLOCK enforcement
        env:
          STEP_OUTCOME: ${{ steps.block.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$STEP_OUTCOME" == "failure" ]]
          [[ -s artifacts/proofqa-time-block.json ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-time-block.json").read_text())
          assert report["decision"] == "BLOCK"
          assert report["should_fail"] is True
          blocked = [
              finding
              for finding in report["findings"]
              if finding["status"] == "BLOCK"
          ]
          assert [finding["axis"] for finding in blocked] == ["time_performance"]
          assert blocked[0]["actual"] == 1200.0
          assert blocked[0]["threshold"] == 1000.0
          PY

      - name: Preserve v2 compatibility with transition and time gates disabled
        id: legacy
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-pass.json
          max-p95-duration-ms: "0"
          transition-policy: ignore
          report-path: artifacts/proofqa-v2-compatible.json

      - name: Verify v2 compatibility
        env:
          DECISION: ${{ steps.legacy.outputs.decision }}
          P95_MS: ${{ steps.legacy.outputs.p95-duration-ms }}
          TRANSITION_STATUS: ${{ steps.legacy.outputs.transition-status }}
          TRANSITION_SHA: ${{ steps.legacy.outputs.transition-sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$P95_MS" == "n/a" ]]
          [[ "$TRANSITION_STATUS" == "n/a" ]]
          [[ "$TRANSITION_SHA" == "n/a" ]]

      - name: Require VERIFIED transition
        id: transition-pass
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-verified.json
          transition-policy: require-verified
          report-path: artifacts/proofqa-transition-pass.json

      - name: Verify transition PASS outputs
        env:
          DECISION: ${{ steps.transition-pass.outputs.decision }}
          TRANSITION_STATUS: ${{ steps.transition-pass.outputs.transition-status }}
          TRANSITION_PHASE: ${{ steps.transition-pass.outputs.transition-phase }}
          TRANSITION_SHA: ${{ steps.transition-pass.outputs.transition-sha256 }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "PASS" ]]
          [[ "$TRANSITION_STATUS" == "VERIFIED" ]]
          [[ "$TRANSITION_PHASE" == "REFLECT" ]]
          [[ "$TRANSITION_SHA" =~ ^[0-9a-f]{64}$ ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-transition-pass.json").read_text())
          assert report["schema_version"] == 3
          assert report["transition"]["status"] == "VERIFIED"
          assert report["findings"][-1]["axis"] == "transition_phase"
          assert report["findings"][-1]["status"] == "PASS"
          PY

      - name: Warn on unfinished transition during adoption
        id: transition-warn
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-in-progress.json
          transition-policy: warn
          fail-on: block
          report-path: artifacts/proofqa-transition-warn.json

      - name: Verify transition WARN outputs
        env:
          DECISION: ${{ steps.transition-warn.outputs.decision }}
          SHOULD_FAIL: ${{ steps.transition-warn.outputs.should-fail }}
          TRANSITION_STATUS: ${{ steps.transition-warn.outputs.transition-status }}
          TRANSITION_PHASE: ${{ steps.transition-warn.outputs.transition-phase }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DECISION" == "WARN" ]]
          [[ "$SHOULD_FAIL" == "false" ]]
          [[ "$TRANSITION_STATUS" == "IN_PROGRESS" ]]
          [[ "$TRANSITION_PHASE" == "EXPAND" ]]

      - name: Block recalibration under strict transition policy
        id: transition-block
        continue-on-error: true
        uses: ./proofqa
        with:
          summary-path: tests/fixtures/proofqa/summary-time-pass.json
          max-p95-duration-ms: "1000"
          transition-report-path: tests/fixtures/proofqa/transition-recalibrate.json
          transition-policy: require-verified
          report-path: artifacts/proofqa-transition-block.json

      - name: Verify transition BLOCK is isolated from model axes
        env:
          STEP_OUTCOME: ${{ steps.transition-block.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$STEP_OUTCOME" == "failure" ]]
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/proofqa-transition-block.json").read_text())
          assert report["decision"] == "BLOCK"
          assert report["transition"]["status"] == "RECALIBRATE"
          blocked = [
              finding
              for finding in report["findings"]
              if finding["status"] == "BLOCK"
          ]
          assert [finding["axis"] for finding in blocked] == ["transition_phase"]
          assert all(
              finding["status"] == "PASS"
              for finding in report["findings"]
              if finding["axis"] != "transition_phase"
          )
          PY

      - name: Upload gate reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: proofqa-transition-gate-reports-${{ github.sha }}
          path: artifacts/proofqa-*.json
          if-no-files-found: error
          retention-days: 14
