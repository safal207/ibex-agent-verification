name: Silicon Gate Action Smoke

on:
  push:
    branches: [main]
    paths:
      - "action.yml"
      - ".github/workflows/github-action-smoke.yml"
      - "src/ibex_agent_verification/github_action.py"
      - "src/ibex_agent_verification/silicon_gate.py"
      - "scripts/run_silicon_gate_demo.sh"
      - "tests/test_github_action.py"
      - "docs/GITHUB_ACTION.md"
  pull_request:
    paths:
      - "action.yml"
      - ".github/workflows/github-action-smoke.yml"
      - "src/ibex_agent_verification/github_action.py"
      - "src/ibex_agent_verification/silicon_gate.py"
      - "scripts/run_silicon_gate_demo.sh"
      - "tests/test_github_action.py"
      - "docs/GITHUB_ACTION.md"

permissions:
  contents: read

jobs:
  action-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build gate fixtures
        run: |
          python -m pip install -e .
          bash scripts/run_silicon_gate_demo.sh artifacts/action-smoke

      - name: ALLOW passes
        id: allow
        uses: ./
        with:
          request: artifacts/action-smoke/allow/gate-request.json
          report: artifacts/action-smoke/allow/action-decision.json

      - name: Observe BLOCK without failing
        id: block_observe
        uses: ./
        with:
          request: artifacts/action-smoke/block/gate-request.json
          report: artifacts/action-smoke/block/action-observe-decision.json
          fail_on_block: "false"

      - name: Enforce BLOCK
        id: block_enforce
        continue-on-error: true
        uses: ./
        with:
          request: artifacts/action-smoke/block/gate-request.json
          report: artifacts/action-smoke/block/action-enforce-decision.json

      - name: Verify action contract
        env:
          ALLOW_DECISION: ${{ steps.allow.outputs.decision }}
          ALLOW_REASONS: ${{ steps.allow.outputs.reason_codes }}
          BLOCK_DECISION: ${{ steps.block_observe.outputs.decision }}
          BLOCK_REASONS: ${{ steps.block_observe.outputs.reason_codes }}
          BLOCK_ENFORCE_OUTCOME: ${{ steps.block_enforce.outcome }}
        run: |
          [[ "$ALLOW_DECISION" == "ALLOW" ]]
          [[ "$ALLOW_REASONS" == *"NO_EVIDENCE_REGRESSION"* ]]
          [[ "$BLOCK_DECISION" == "BLOCK" ]]
          [[ "$BLOCK_REASONS" == *"NEW_UNEXPLAINED_TIMING_ANOMALY"* ]]
          [[ "$BLOCK_ENFORCE_OUTCOME" == "failure" ]]

      - name: Upload action smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silicon-gate-action-smoke-${{ github.sha }}
          path: artifacts/action-smoke/
          if-no-files-found: error
          retention-days: 14
